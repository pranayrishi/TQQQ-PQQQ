name: Daily Trading Execution

on:
  schedule:
    - cron: '50 15 * * 1-5'
      timezone: "America/New_York"

  workflow_dispatch:
    inputs:
      live:
        description: "Submit real Alpaca orders"
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: tqqq-daily-trading
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore market-data cache
        uses: actions/cache@v4
        with:
          path: data/cache/*.csv
          key: market-data-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            market-data-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading execution
        shell: bash
        env:
          TZ: America/New_York
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET: ${{ secrets.ALPACA_API_SECRET }}
        run: |
          args=(--run-once)

          # Manual runs default to dry-run. Scheduled runs are live.
          if [[ "${{ github.event_name }}" == "workflow_dispatch" &&
                "${{ inputs.live }}" != "true" ]]; then
            args+=(--dry-run --force)
          fi

          python -m src.main "${args[@]}"